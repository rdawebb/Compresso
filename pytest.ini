[pytest]
# Pytest configuration for Compresso test suite

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Minimum version
minversion = 7.0

# Python path configuration - add src directory
pythonpath = src

# Test paths
testpaths = tests/python

# Command line options
addopts =
    -ra
    --strict-markers
    --strict-config
    --showlocals

# Markers
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests
    parametrize: marks parameterized tests
    benchmark: marks benchmark tests

# Coverage options (when using pytest-cov)
# Run with: pytest --cov=compresso --cov-report=html
[coverage:run]
source = src/compresso
omit =
    */tests/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

# Ignore warnings from dependencies
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
